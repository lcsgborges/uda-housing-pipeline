name: hdi-dev

x-project-labels: &project-labels
  org.opencontainers.image.authors: Lucas Guimarães Borges <lcsgborges@gmail.com>
  org.opencontainers.image.source: https://github.com/lcsgborges/uda-housing-pipeline
  org.opencontainers.image.url: https://github.com/lcsgborges/uda-housing-pipeline

x-api-environment: &api-environment
  APP_ENV: ${APP_ENV:-dev}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-uda}:${POSTGRES_PASSWORD:-uda}@postgres:5432/${POSTGRES_DB:-uda}
  DOCUMENTS_DIR: /app/data/documents
  STORAGE_BACKEND: rustfs
  RUSTFS_ENDPOINT: rustfs:9000
  RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
  RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
  RUSTFS_BUCKET: ${RUSTFS_BUCKET:-uda-documents}
  RUSTFS_SECURE: "false"
  LLM_PROVIDER: ${LLM_PROVIDER:-openai}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
  EXTRACTION_PROMPT_VERSION: ${EXTRACTION_PROMPT_VERSION:-v2}
  EXTRACTION_BATCH_SIZE: ${EXTRACTION_BATCH_SIZE:-5}
  ENABLE_INGESTION_SCHEDULER: ${ENABLE_INGESTION_SCHEDULER:-false}
  INGESTION_POLL_INTERVAL_MINUTES: ${INGESTION_POLL_INTERVAL_MINUTES:-1440}
  REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-20}
  USER_AGENT: ${USER_AGENT:-Pipeline-UDA/1.0}
  EXTRACTION_FULL_SCAN_MAX_CHARS: ${EXTRACTION_FULL_SCAN_MAX_CHARS:-14000}
  EXTRACTION_CONTEXT_MAX_CHARS: ${EXTRACTION_CONTEXT_MAX_CHARS:-18000}

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: hdi-dev-api
    labels:
      <<: *project-labels
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      <<: *api-environment
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./docker:/app/docker
      - ./alembic.ini:/app/alembic.ini
      - ./data:/app/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  docs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: hdi-dev-docs
    labels:
      <<: *project-labels
    ports:
      - "${DOCS_PORT:-8001}:8001"
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - ./docs:/app/docs
      - ./mkdocs.yml:/app/mkdocs.yml
      - ./README.md:/app/README.md
    command: ["mkdocs", "serve", "-a", "0.0.0.0:8001"]

  postgres:
    image: postgres:16-alpine
    container_name: hdi-dev-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uda}
      POSTGRES_USER: ${POSTGRES_USER:-uda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uda}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rustfs_perms:
    image: alpine:3.20
    container_name: hdi-dev-rustfs-perms
    user: root
    volumes:
      - rustfs_data:/data
    command: chown -R 10001:10001 /data

  rustfs:
    image: rustfs/rustfs:latest
    container_name: hdi-dev-rustfs
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    environment:
      RUSTFS_ADDRESS: :9000
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs_data:/data
    command: ["/data"]
    depends_on:
      rustfs_perms:
        condition: service_completed_successfully

volumes:
  postgres_data:
  rustfs_data:
