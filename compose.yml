name: housing-data-intelligence

x-project-labels: &project-labels
  org.opencontainers.image.authors: Lucas Guimarães Borges <lcsgborges@gmail.com>
  org.opencontainers.image.source: https://github.com/lcsgborges/uda-housing-pipeline
  org.opencontainers.image.url: https://github.com/lcsgborges/uda-housing-pipeline

x-api-environment: &api-environment
  APP_NAME: ${APP_NAME:-Pipeline UDA}
  APP_ENV: ${APP_ENV:-dev}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  PYTHONPATH: /app
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-uda}:${POSTGRES_PASSWORD:-uda}@postgres:5432/${POSTGRES_DB:-uda}
  DOCUMENTS_DIR: ${DOCUMENTS_DIR:-/app/data/documents}
  STORAGE_BACKEND: ${STORAGE_BACKEND:-rustfs}
  RUSTFS_ENDPOINT: ${COMPOSE_RUSTFS_ENDPOINT:-rustfs:9000}
  RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
  RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
  RUSTFS_BUCKET: ${RUSTFS_BUCKET:-uda-documents}
  RUSTFS_SECURE: ${RUSTFS_SECURE:-false}
  LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
  OPENAI_CLASSIFICATION_MODEL: ${OPENAI_CLASSIFICATION_MODEL:-gpt-4.1-mini}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
  OLLAMA_CLASSIFICATION_MODEL: ${OLLAMA_CLASSIFICATION_MODEL:-llama3.1}
  EXTRACTION_PROMPT_VERSION: ${EXTRACTION_PROMPT_VERSION:-v2}
  CLASSIFICATION_BATCH_SIZE: ${CLASSIFICATION_BATCH_SIZE:-5}
  EXTRACTION_BATCH_SIZE: ${EXTRACTION_BATCH_SIZE:-5}
  REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-20}
  USER_AGENT: ${USER_AGENT:-Pipeline-UDA/1.0}
  ENABLE_INGESTION_SCHEDULER: ${ENABLE_INGESTION_SCHEDULER:-false}
  INGESTION_SCHEDULE_HOUR: ${INGESTION_SCHEDULE_HOUR:-2}
  INGESTION_SCHEDULE_MINUTE: ${INGESTION_SCHEDULE_MINUTE:-0}
  SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-America/Sao_Paulo}
  CLASSIFICATION_CONTEXT_MAX_CHARS: ${CLASSIFICATION_CONTEXT_MAX_CHARS:-12000}
  CLASSIFICATION_SAMPLE_PAGES: ${CLASSIFICATION_SAMPLE_PAGES:-3}
  EXTRACTION_FULL_SCAN_MAX_CHARS: ${EXTRACTION_FULL_SCAN_MAX_CHARS:-14000}
  EXTRACTION_CONTEXT_MAX_CHARS: ${EXTRACTION_CONTEXT_MAX_CHARS:-18000}

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hdi-api:${APP_VERSION:-latest}
    container_name: hdi-api
    labels:
      <<: *project-labels
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      <<: *api-environment
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - api_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: ${API_HEALTHCHECK_INTERVAL:-30s}
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: hdi-postgres
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uda}
      POSTGRES_USER: ${POSTGRES_USER:-uda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uda}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rustfs_perms:
    image: alpine:3.20
    container_name: hdi-rustfs-perms
    user: root
    volumes:
      - rustfs_data:/data
    command: chown -R 10001:10001 /data

  rustfs:
    image: rustfs/rustfs:latest
    container_name: hdi-rustfs
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    environment:
      RUSTFS_ADDRESS: :9000
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs_data:/data
    command: ["/data"]
    depends_on:
      rustfs_perms:
        condition: service_completed_successfully

volumes:
  api_data:
  postgres_data:
  rustfs_data:
