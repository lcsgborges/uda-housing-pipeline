site_name: Housing Data Intelligence
site_description: Documentação técnica do pipeline UDA para conjuntura habitacional.
site_author: Lucas Guimarães Borges <lcsgborges@gmail.com>
repo_name: lcsgborges/uda-housing-pipeline
repo_url: https://github.com/lcsgborges/uda-housing-pipeline
copyright: Copyright &copy; 2026 Lucas Guimarães Borges

theme:
  name: material
  language: pt-BR
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Alternar para tema escuro
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Alternar para tema claro

nav:
  - Início: index.md
  - Sobre: sobre.md
  - Projeto:
      - Objetivo e Escopo: projeto/objetivo.md
      - Arquitetura: projeto/arquitetura.md
      - Fluxo de Dados: projeto/fluxo-de-dados.md
      - Padrão de Projeto: projeto/padrao-de-projeto.md
  - Módulos:
      - Visão Geral: modulos/visao-geral.md
      - Ingestão: modulos/ingestao.md
      - Extração UDA: modulos/extracao.md
      - Métricas e Conjuntura: modulos/metricas.md
      - Storage e Linhagem: modulos/storage-linhagem.md
  - Ambiente:
      - Configuração: ambiente/configuracao.md
      - Executar Localmente: ambiente/execucao-local.md
      - Docker Compose: como_rodar_com_compose.md
      - Testes: ambiente/testes.md
  - Referências:
      - Processamento UDA: processamento_uda.md
      - Guia de Aplicação e Teste Manual: guia_aplicacao_e_teste_manual.md
      - Exemplo de Conjuntura: exemplos/README.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  author_email: lcsgborges@gmail.com
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lcsgborges
      name: GitHub de Lucas Guimarães Borges
    - icon: fontawesome/solid/envelope
      link: mailto:lcsgborges@gmail.com
      name: E-mail de Lucas Guimarães Borges
