name: CI

# Author: Lucas Guimarães Borges <lcsgborges@gmail.com> (https://github.com/lcsgborges)
# Repository: https://github.com/lcsgborges/uda-housing-pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Tests and Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_ENV: test
      LLM_PROVIDER: ollama
      STORAGE_BACKEND: local
      DOCUMENTS_DIR: /tmp/uda-test-documents
      TEST_POSTGRES_IMAGE: postgres:16-alpine
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Pre-pull PostgreSQL image
        run: docker pull postgres:16-alpine

      - name: Run linter
        run: uv run task lint

      - name: Run tests
        run: uv run pytest -q --cov=app --cov-report=term-missing

  docs:
    name: Build MkDocs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Build documentation
        run: uv run task mkdocs_build

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-docs:
    name: Deploy MkDocs
    runs-on: ubuntu-latest
    needs:
      - checks
      - docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
